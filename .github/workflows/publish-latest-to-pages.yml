name: Publish latest file tree to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

# This workflow intentionally OVERWRITES the published Pages site on every run.
# That guarantees the previous version's generated file tree is removed.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare
        run: |
          set -euo pipefail
          rm -rf work site
          mkdir -p work site/latest

      - name: Resolve release asset URL
        id: rel
        uses: actions/github-script@v7
        with:
          script: |
            // For `release` events we can use the payload assets directly.
            // For `workflow_dispatch` we query the latest release.
            let release = context.payload.release;
            if (!release) {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const resp = await github.rest.repos.getLatestRelease({ owner, repo });
              release = resp && resp.data;
            }

            const assets = (release && release.assets) ? release.assets : [];
            const found = assets.find(a => (a && a.name || '').toLowerCase() === 'scalpzilla.zip');
            if (!found) {
              core.setFailed('Release asset scalpzilla.zip not found.');
              return;
            }

            core.setOutput('asset_api_url', found.url);
            core.setOutput('tag_name', (release && release.tag_name) ? String(release.tag_name) : '');

      - name: Download scalpzilla.zip
        run: |
          set -euo pipefail
          curl -L \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/octet-stream" \
            "${{ steps.rel.outputs.asset_api_url }}" \
            -o work/scalpzilla.zip
          ls -lah work/scalpzilla.zip

      - name: Extract zip into work/extract
        run: |
          set -euo pipefail
          python - << 'PY'
          import zipfile
          from pathlib import Path
          import shutil

          z = Path('work/scalpzilla.zip')
          out = Path('work/extract')
          if out.exists():
              shutil.rmtree(out)
          out.mkdir(parents=True, exist_ok=True)

          def safe_extract_member(zf: zipfile.ZipFile, member: zipfile.ZipInfo, dest: Path) -> None:
            # GitHub Actions runs on Linux; if the ZIP was created on Windows, entries might
            # contain backslashes. Python's extractall() treats backslashes as literal chars
            # on Linux, which breaks directories like _internal/.
            name = (member.filename or '').replace('\\', '/')
            if not name or name.endswith('/'):
              return
            # Disallow absolute paths and traversal.
            if name.startswith('/') or name.startswith('../') or '/..' in name:
              raise SystemExit(f'Unsafe zip entry: {member.filename!r}')

            target = (dest / name)
            target_parent = target.parent
            target_parent.mkdir(parents=True, exist_ok=True)

            with zf.open(member, 'r') as src, target.open('wb') as dst:
              shutil.copyfileobj(src, dst)

          with zipfile.ZipFile(z, 'r') as zf:
            for member in zf.infolist():
              safe_extract_member(zf, member, out)

          # Determine bundle root: either directly contains Scalpzilla.exe or a single child dir does.
          exe = out / 'Scalpzilla.exe'
          if exe.is_file():
              root = out
          else:
              children = [p for p in out.iterdir() if p.is_dir()]
              root = None
              if len(children) == 1 and (children[0] / 'Scalpzilla.exe').is_file():
                  root = children[0]
              else:
                  for d in children:
                      if (d / 'Scalpzilla.exe').is_file():
                          root = d
                          break
              if root is None:
                  raise SystemExit('Could not find Scalpzilla.exe in extracted zip')

          (Path('work') / 'bundle_root.txt').write_text(str(root.as_posix()), 'utf-8')
          print('bundle_root=', root)
          PY

      - name: Copy bundle to site/latest
        run: |
          set -euo pipefail
          python - << 'PY'
          import shutil
          from pathlib import Path

          root = Path(Path('work/bundle_root.txt').read_text('utf-8').strip())
          dst = Path('site/latest')

          # Clean destination
          if dst.exists():
              shutil.rmtree(dst)
          dst.mkdir(parents=True, exist_ok=True)

          for child in root.iterdir():
              target = dst / child.name
              if child.is_dir():
                  shutil.copytree(child, target)
              else:
                  shutil.copy2(child, target)

          print('Copied to', dst)
          PY

      - name: Generate manifest.json
        run: |
          set -euo pipefail
          python - << 'PY'
          import hashlib
          import json
          import time
          from pathlib import Path

          root = Path('site/latest').resolve()
          exe = root / 'Scalpzilla.exe'
          if not exe.is_file():
              raise SystemExit('site/latest missing Scalpzilla.exe')

          def sha256_file(p: Path) -> str:
              h = hashlib.sha256()
              with p.open('rb') as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b''):
                      if not chunk:
                          break
                      h.update(chunk)
              return h.hexdigest().lower()

          files = {}
          for p in root.rglob('*'):
              if not p.is_file():
                  continue
              rel = p.relative_to(root).as_posix().lstrip('/')
              name = rel.rsplit('/', 1)[-1].lower()
              if name.endswith('.part') or name.endswith('.tmp'):
                  continue
              files[rel] = {
                  'size': int(p.stat().st_size),
                  'sha256': sha256_file(p),
              }

          out = {
              'schema': 1,
              'generated_at_utc': int(time.time()),
              'version': (('${{ steps.rel.outputs.tag_name }}' or '').lstrip('v')),
              'files': files,
          }

          (root / 'manifest.json').write_text(json.dumps(out, indent=2, sort_keys=True), 'utf-8')
          print('manifest files=', len(files))
          PY

      - name: Validate published tree
        run: |
          set -euo pipefail
          if [ ! -f site/latest/Scalpzilla.exe ]; then
            echo 'Missing site/latest/Scalpzilla.exe'
            ls -lah site/latest || true
            exit 1
          fi

          # The critical bit for onedir: PyInstaller dependencies live under _internal.
          # If this directory is missing, GitHub Pages will serve only the EXE/manifest and updates will 404.
          if [ ! -d site/latest/_internal ]; then
            echo 'Missing site/latest/_internal directory'
            echo 'Top-level site/latest listing:'
            ls -lah site/latest || true

            echo 'Files with backslashes in their names (symptom of Windows-path ZIP extraction on Linux):'
            python -c "from pathlib import Path; root=Path('site/latest'); hits=[str(p) for p in root.rglob('*') if p.is_file() and ('\\\\' in p.name)]; print('\\n'.join(hits[:200])); print('backslash_name_count=', len(hits))"

            exit 1
          fi

          if [ ! -f site/latest/_internal/python311.dll ]; then
            echo 'Missing site/latest/_internal/python311.dll'
            echo 'Listing site/latest/_internal:'
            ls -lah site/latest/_internal || true
            exit 1
          fi

          python - << 'PY'
          from pathlib import Path

          root = Path('site/latest')
          n = sum(1 for p in root.rglob('*') if p.is_file())
          print('file_count=', n)
          PY

      - name: Disable Jekyll (.nojekyll)
        run: |
          set -euo pipefail
          touch site/.nojekyll

      - name: Remove any other published trees
        run: |
          set -euo pipefail
          find site -mindepth 1 -maxdepth 1 ! -name latest ! -name .nojekyll -exec rm -rf {} +

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
